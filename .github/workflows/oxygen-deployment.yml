# Don't change the line below!
#! oxygen_storefront_id: 1000130179

name: Deploy to Oxygen
on:
  push:
    branches: [main, dev]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Oxygen
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          check-latest: true

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy to Oxygen
        run: npx shopify hydrogen deploy --token "${{ secrets.OXYGEN_DEPLOYMENT_TOKEN_1000130179 }}"